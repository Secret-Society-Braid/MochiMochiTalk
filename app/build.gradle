plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'

    id 'com.github.johnrengelman.shadow' version '5.1.0'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
    maven {
        name 'm2-dv8tion'
        url 'https://m2.dv8tion.net/releases'
    }
    maven {
        url 'https://jitpack.io'
    }
    jcenter()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation 'org.junit.jupiter:junit-jupiter:5.7.2'

    // This dependency is used by the application.
    implementation 'com.google.guava:guava:30.1.1-jre'

    // Java Discord API
    implementation('net.dv8tion:JDA:4.3.0_277')

    // logback
    implementation('ch.qos.logback:logback-classic:1.2.3')

    implementation 'com.google.cloud:google-cloud-speech:1.22.6'
    implementation 'com.google.cloud:google-cloud-texttospeech:1.0.2'
    implementation 'com.github.wdavies973:VocalCord:2.5'

    // jackson core, databind, annotation
    implementation('com.fasterxml.jackson.core:jackson-core:2.9.6')
    implementation('com.fasterxml.jackson.core:jackson-databind:2.9.6')
    implementation('com.fasterxml.jackson.core:jackson-annotations:2.9.6')
}

application {
    // Define the main class for the application.
    mainClassName = 'MochiMochiTalk.App'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8';
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

task stage(dependsOn: ['build', 'clean'])
build.mustRunAfter clean
