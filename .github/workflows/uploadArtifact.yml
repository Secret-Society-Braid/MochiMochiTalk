
name: Build Artifacts with Gradle

on:
  push:
    branches: [ master ]

jobs:
  artifacts:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'adopt'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Tests with Gradle
      run: ./gradlew build -i
    - name: Upload artifacts to actions
      uses: actions/upload-artifact@v2
      with:
        name: app-all.jar
        path: app/build/libs/app-all.jar
