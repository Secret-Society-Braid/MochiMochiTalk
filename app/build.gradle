plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'

    id 'com.github.johnrengelman.shadow' version '7.1.2'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
    maven {
        name 'm2-dv8tion'
        url 'https://m2.dv8tion.net/releases'
    }
    maven {
        url 'https://jitpack.io'
    }
    jcenter()
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation 'org.junit.jupiter:junit-jupiter:5.8.2'

    // This dependency is used by the application.
    implementation 'com.google.guava:guava:31.0.1-jre'

    // Java Discord API
    implementation('net.dv8tion:JDA:4.4.0_352')

    // logback
    implementation('ch.qos.logback:logback-classic:1.2.10')

    implementation 'com.google.cloud:google-cloud-speech:2.2.11'
    implementation 'com.google.cloud:google-cloud-texttospeech:2.1.1'
    implementation 'com.github.wdavies973:VocalCord:2.3'

    // jackson core, databind, annotation
    implementation('com.fasterxml.jackson.core:jackson-core:2.13.1')
    implementation('com.fasterxml.jackson.core:jackson-databind:2.13.1')
    implementation('com.fasterxml.jackson.core:jackson-annotations:2.13.1')

    // HajimeAPI wrapper
    implementation(fileTree(dir: '..\\native', include: ['HajimeAPI4J-v2.0.1-Experimental.jar']))
}

application {
    // Define the main class for the application.
    mainClassName = 'MochiMochiTalk.App'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8';
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}

sourceCompatibility = JavaVersion.VERSION_11
targetCompatibility = JavaVersion.VERSION_11

task stage(dependsOn: ['build', 'clean'])
build.mustRunAfter clean
